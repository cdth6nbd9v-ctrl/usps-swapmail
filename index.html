<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USPS Mutual Transfers - SwapMail</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <span class="usps-blue">📬</span> SwapMail
        </div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#how-it-works">How it Works</a></li>
            <li><a href="#map-section">Live Map</a></li>
            <li><a href="#find-transfers">Find Transfers</a></li>
            <li><a href="#post-request">Post Request</a></li>
            <li><a href="#about">About</a></li>
        </ul>
        <button class="btn-primary" onclick="document.getElementById('login-modal').style.display = 'flex'">Login / Sign Up</button>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Find Your Perfect USPS Mutual Transfer</h1>
            <p class="hero-subtitle">Connect with fellow carriers ready to swap locations. Faster, easier, and more fun than the official process!</p>
            <div class="cta-buttons">
                <button class="btn-primary large" onclick="document.getElementById('post-request').scrollIntoView({ behavior: 'smooth' })">Post Your Transfer Request</button>
                <button class="btn-secondary large" onclick="document.getElementById('find-transfers').scrollIntoView({ behavior: 'smooth' })">Browse Available Swaps</button>
            </div>
        </div>
        <div class="animation-container">
            <img src="mail-truck.png" alt="USPS Mail Truck" style="max-width: 560px; height: auto; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
        </div>
    </section>

    <!-- Other sections (map, how it works, etc.) -->
    <!-- (Keep your existing sections here) -->

<!-- Login Modal -->
<div id="login-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center;">
    <div style="background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);">
        <span onclick="hideLoginModal()" style="float:right; font-size:28px; cursor:pointer;">×</span>
        <h2>Login / Sign Up</h2>
        
        <input type="email" id="email" placeholder="USPS Email" style="width:100%; padding:12px; margin:10px 0;">
        <input type="password" id="password" placeholder="Password" style="width:100%; padding:12px; margin:10px 0;">
        
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:#003087; color:white; border:none; border-radius:8px;">Login / Sign Up</button>
        
        <p id="auth-message" style="text-align:center; margin-top:10px;"></p>
    </div>
</div>
